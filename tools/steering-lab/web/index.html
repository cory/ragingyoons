<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Steering Lab — Raging Yoons</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0d10;
        --panel: #15181d;
        --line: #2a2e36;
        --text: #ddd;
        --muted: #888;
        --accent: #6cf;
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body { background: var(--bg); color: var(--text); font: 13px ui-monospace, Menlo, monospace; }
      input, select, button { background: #1a1d23; color: #ddd; border: 1px solid var(--line); border-radius: 3px; padding: 3px 6px; font: inherit; }
      button { cursor: pointer; }
      button:hover:not(:disabled) { background: #20252c; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      label { display: flex; align-items: center; gap: 6px; color: var(--muted); }
      label input[type=checkbox] { cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
