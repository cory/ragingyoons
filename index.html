<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ragingyoons</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #efe9dc;
        --ink: #1a1815;
        --ink-soft: #6e6455;
        --rule: rgba(26, 24, 21, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--paper);
        color: var(--ink);
        font-family: "Cormorant Garamond", Georgia, serif;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: 1fr 280px;
      }
      #stage {
        position: relative;
        overflow: hidden;
      }
      #stage canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
      #panel {
        border-left: 1px solid var(--rule);
        padding: 18px 18px 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
        background: linear-gradient(180deg, rgba(239, 233, 220, 1), rgba(239, 233, 220, 0.92));
      }
      h1 {
        font-weight: 500;
        font-size: 22px;
        margin: 0 0 2px;
        letter-spacing: 0.02em;
      }
      h2 {
        font-weight: 500;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin: 0 0 8px;
        color: var(--ink-soft);
        font-family: "JetBrains Mono", monospace;
      }
      .sub {
        font-size: 13px;
        color: var(--ink-soft);
        margin: 0 0 8px;
        font-family: "JetBrains Mono", monospace;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      button {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: transparent;
        border: 1px solid var(--rule);
        color: var(--ink);
        padding: 6px 9px;
        cursor: pointer;
        border-radius: 0;
        transition: background 0.12s, border-color 0.12s;
      }
      button:hover {
        border-color: var(--ink);
      }
      button.active {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }
      .character-card {
        border-top: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
        padding: 10px 0;
      }
      .roster {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 360px;
        overflow-y: auto;
        padding-right: 4px;
      }
      .team-block {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .team-header {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .team-stripe {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 1px solid var(--ink);
      }
      .team-name {
        font-weight: 500;
      }
      .team-meta {
        margin-left: auto;
        color: var(--ink-soft);
        font-size: 10px;
      }
      .team-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .inspector-name {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 4px;
        letter-spacing: 0.02em;
      }
      .inspector-grid {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 2px 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        line-height: 1.45;
        color: var(--ink-soft);
      }
      .inspector-grid b {
        color: var(--ink);
        font-weight: 500;
      }
      .roster-tile {
        position: relative;
        border: 1px solid var(--rule);
        padding: 8px 8px 7px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.18);
        transition: border-color 0.12s, background 0.12s;
        overflow: hidden;
        min-height: 56px;
      }
      .roster-tile:hover {
        border-color: var(--ink);
      }
      .roster-tile.active {
        border-color: var(--ink);
        background: rgba(26, 24, 21, 0.06);
      }
      .roster-tile .tile-stripe {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
      }
      .roster-tile .tile-name {
        font-size: 15px;
        font-weight: 500;
        line-height: 1.15;
        letter-spacing: 0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .roster-tile .tile-meta {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-top: 2px;
      }
      .character-card .name {
        font-size: 22px;
        font-weight: 500;
      }
      .character-card .epithet {
        font-style: italic;
        color: var(--ink-soft);
        font-size: 14px;
      }
      .character-card .meta {
        margin-top: 6px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--ink-soft);
        letter-spacing: 0.06em;
      }
      .stats {
        display: flex;
        gap: 14px;
        margin-top: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
      }
      .stats span {
        color: var(--ink-soft);
      }
      .stats b {
        font-weight: 500;
        color: var(--ink);
        margin-left: 4px;
      }
      .sliders {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 10px;
      }
      .slider-row {
        display: grid;
        grid-template-columns: 70px 1fr 44px;
        align-items: center;
        gap: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--ink-soft);
      }
      .slider-row .slider-label {
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .slider-row input[type="range"] {
        appearance: none;
        background: transparent;
        height: 16px;
        margin: 0;
      }
      .slider-row input[type="range"]::-webkit-slider-runnable-track {
        height: 1px;
        background: var(--ink);
      }
      .slider-row input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 10px;
        height: 14px;
        background: var(--paper);
        border: 1px solid var(--ink);
        margin-top: -7px;
        border-radius: 0;
      }
      .slider-row input[type="range"]::-moz-range-track {
        height: 1px;
        background: var(--ink);
      }
      .slider-row input[type="range"]::-moz-range-thumb {
        width: 10px;
        height: 14px;
        background: var(--paper);
        border: 1px solid var(--ink);
        border-radius: 0;
      }
      .slider-row .slider-val {
        text-align: right;
        color: var(--ink);
      }
      #boot-error {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 30px;
        text-align: center;
        font-size: 18px;
        line-height: 1.6;
      }
      #boot-error.visible {
        display: grid;
      }
      #perf {
        position: absolute;
        top: 10px;
        left: 10px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--ink);
        background: rgba(239, 233, 220, 0.7);
        padding: 4px 8px;
        border: 1px solid var(--rule);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="canvas"></canvas>
        <div id="perf">— fps</div>
        <div id="boot-error"></div>
      </div>
      <aside id="panel">
        <div>
          <h1>ragingyoons</h1>
          <p class="sub">procedural totem · pencil on vellum</p>
        </div>

        <div>
          <h2>view</h2>
          <div class="row" id="viewModeRow"></div>
        </div>

        <div id="flockPanel" style="display: none">
          <h2>flock</h2>
          <div class="slider-row">
            <span class="slider-label">count</span>
            <input type="range" id="boidCount" min="10" max="20000" value="60" />
            <span class="slider-val" id="boidCountVal">60</span>
          </div>
          <div class="row" style="margin-top: 6px">
            <button id="btnRadii">radii</button>
          </div>
          <div id="boidInspector" style="display: none; margin-top: 10px">
            <div class="inspector-name" id="biName">—</div>
            <div class="inspector-grid" id="biGrid"></div>
          </div>
        </div>

        <div>
          <h2>roster</h2>
          <div class="roster" id="roster"></div>
          <div class="row" style="margin-top: 8px">
            <button id="btnReroll">reroll all</button>
          </div>
        </div>

        <div class="character-card" id="card">
          <div class="name" id="cName">—</div>
          <div class="epithet" id="cEpithet">—</div>
          <div class="meta" id="cMeta">—</div>
          <div class="stats" id="cStats"></div>
        </div>

        <div id="raccoonPanel">
          <h2>shape</h2>
          <div class="row">
            <button id="btnRaccoonReset">reset</button>
          </div>
          <div class="sliders" id="raccoonSliders"></div>
        </div>

        <div>
          <h2>gait</h2>
          <div class="row" id="gaitRow"></div>
        </div>

        <div>
          <h2>mood</h2>
          <div class="row" id="moodRow"></div>
          <div class="sliders" id="moodSliders"></div>
        </div>

        <div>
          <h2>overlays</h2>
          <div class="row" id="viewRow">
            <button id="btnAxes">axes</button>
            <button id="btnPrints">footprints</button>
            <button id="btnInk">ink</button>
            <button id="btnFur">fur</button>
          </div>
          <div class="sliders">
            <div class="slider-row">
              <span class="slider-label">fur length</span>
              <input type="range" id="furLength" min="0.030" max="0.130" step="0.005" />
              <span class="slider-val" id="furLengthVal"></span>
            </div>
            <div class="slider-row">
              <span class="slider-label">fur density</span>
              <input type="range" id="furDensity" min="30" max="80" step="5" />
              <span class="slider-val" id="furDensityVal"></span>
            </div>
          </div>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
