<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ragingyoons</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #efe9dc;
        --ink: #1a1815;
        --ink-soft: #6e6455;
        --rule: rgba(26, 24, 21, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--paper);
        color: var(--ink);
        font-family: "Cormorant Garamond", Georgia, serif;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: 1fr 280px;
      }
      #stage {
        position: relative;
        overflow: hidden;
      }
      #stage canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
      #panel {
        border-left: 1px solid var(--rule);
        padding: 18px 18px 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
        background: linear-gradient(180deg, rgba(239, 233, 220, 1), rgba(239, 233, 220, 0.92));
      }
      h1 {
        font-weight: 500;
        font-size: 22px;
        margin: 0 0 2px;
        letter-spacing: 0.02em;
      }
      h2 {
        font-weight: 500;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin: 0 0 8px;
        color: var(--ink-soft);
        font-family: "JetBrains Mono", monospace;
      }
      .sub {
        font-size: 13px;
        color: var(--ink-soft);
        margin: 0 0 8px;
        font-family: "JetBrains Mono", monospace;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      button {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: transparent;
        border: 1px solid var(--rule);
        color: var(--ink);
        padding: 6px 9px;
        cursor: pointer;
        border-radius: 0;
        transition: background 0.12s, border-color 0.12s;
      }
      button:hover {
        border-color: var(--ink);
      }
      button.active {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }
      .character-card {
        border-top: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
        padding: 10px 0;
      }
      .character-card .name {
        font-size: 22px;
        font-weight: 500;
      }
      .character-card .epithet {
        font-style: italic;
        color: var(--ink-soft);
        font-size: 14px;
      }
      .character-card .meta {
        margin-top: 6px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--ink-soft);
        letter-spacing: 0.06em;
      }
      .stats {
        display: flex;
        gap: 14px;
        margin-top: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
      }
      .stats span {
        color: var(--ink-soft);
      }
      .stats b {
        font-weight: 500;
        color: var(--ink);
        margin-left: 4px;
      }
      #boot-error {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 30px;
        text-align: center;
        font-size: 18px;
        line-height: 1.6;
      }
      #boot-error.visible {
        display: grid;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="canvas"></canvas>
        <div id="boot-error"></div>
      </div>
      <aside id="panel">
        <div>
          <h1>ragingyoons</h1>
          <p class="sub">procedural totem · pencil on vellum</p>
        </div>

        <div class="character-card" id="card">
          <div class="name" id="cName">—</div>
          <div class="epithet" id="cEpithet">—</div>
          <div class="meta" id="cMeta">—</div>
          <div class="stats" id="cStats"></div>
        </div>

        <div>
          <h2>character</h2>
          <div class="row">
            <button id="btnReroll">reroll</button>
          </div>
        </div>

        <div>
          <h2>gait</h2>
          <div class="row" id="gaitRow"></div>
        </div>

        <div>
          <h2>mood</h2>
          <div class="row" id="moodRow"></div>
        </div>

        <div>
          <h2>view</h2>
          <div class="row" id="viewRow">
            <button id="btnAxes">axes</button>
          </div>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
